<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient - Deep purple with subtle variation -->
    <radialGradient id="bgGradient" cx="40%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </radialGradient>
    
    <!-- Main gradient - Brighter Purple to Blue -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow gradient - Bright Purple to Green -->
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.4"/>
    </filter>
    
    <!-- Strong glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circular background with gradient -->
  <circle cx="512" cy="512" r="512" fill="url(#bgGradient)"/>
  
  <!-- Decorative rings for depth -->
  <circle cx="512" cy="512" r="495" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.2"/>
  <circle cx="512" cy="512" r="475" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
  
  <!-- Main icon group - centered -->
  <g transform="translate(512, 512)">
    
    <!-- Request label (left) with glow -->
    <text x="-350" y="-100" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Request</text>
    
    <!-- Mock label (right) with glow -->
    <text x="350" y="-100" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#34d399" text-anchor="middle" filter="url(#glow)">Mock</text>
    
    <!-- Through arrow (from left to right, passing through API) -->
    <g filter="url(#shadow)">
      <!-- Arrow shaft: left side rounded, right side square -->
      <path d="M -420 -30 
               L 430 -30 
               L 430 30 
               L -420 30 
               Q -450 30 -450 0 
               Q -450 -30 -420 -30 Z" 
            fill="url(#arrowGradient)"/>
      <!-- Arrow head (triangle starting at x=430) -->
      <path d="M 430 -60 L 500 0 L 430 60 Z" fill="#34d399"/>
    </g>
    
    <!-- Central API circle (on top of arrow) -->
    <circle cx="0" cy="0" r="160" fill="url(#mainGradient)" filter="url(#shadow)"/>
    
    <!-- Inner circle for depth -->
    <circle cx="0" cy="0" r="120" fill="#ffffff" opacity="0.2"/>
    
    <!-- API text in center with glow -->
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">API</text>
    
  </g>
  
</svg>
