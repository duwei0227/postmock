app-id: cn.probiecoder.postmock
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: postmock

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home

modules:
  - name: postmock
    buildsystem: simple
    build-commands:
      - install -Dm755 postmock /app/bin/postmock
      - install -Dm644 cn.probiecoder.postmock.desktop /app/share/applications/cn.probiecoder.postmock.desktop
      - install -Dm644 cn.probiecoder.postmock.metainfo.xml /app/share/metainfo/cn.probiecoder.postmock.metainfo.xml
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/cn.probiecoder.postmock.png
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/cn.probiecoder.postmock.png
    sources:
      - type: archive
        url: https://github.com/duwei0227/postmock/releases/download/v0.1.0/postmock_0.1.0_amd64.AppImage
        sha256: REPLACE_WITH_ACTUAL_SHA256
        dest-filename: postmock.AppImage
      - type: script
        dest-filename: postmock
        commands:
          - exec /app/bin/postmock.AppImage "$@"
      - type: file
        path: flatpak/cn.probiecoder.postmock.desktop
      - type: file
        path: flatpak/cn.probiecoder.postmock.metainfo.xml
      - type: file
        path: src-tauri/icons/128x128.png
        dest-filename: icon-128.png
      - type: file
        path: src-tauri/icons/icon.png
        dest-filename: icon-256.png
