name: Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      
      - name: Get version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="v${{ env.PACKAGE_VERSION }}"
          
          # 从 CHANGELOG.md 提取当前版本的更新内容
          if [ -f "CHANGELOG.md" ]; then
            # 提取版本段落（从 ## [version] 到下一个 ## 或文件末尾）
            CHANGELOG=$(sed -n "/## \[${{ env.PACKAGE_VERSION }}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
            
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="查看完整变更日志了解详情。"
            fi
          else
            CHANGELOG="查看完整变更日志了解详情。"
          fi
          
          # 保存到文件以避免多行问题
          echo "$CHANGELOG" > /tmp/changelog.txt
      
      - name: Create release body
        run: |
          VERSION="${{ env.PACKAGE_VERSION }}"
          CHANGELOG=$(cat /tmp/changelog.txt)
          
          echo "## 下载安装" > /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "请根据你的操作系统下载对应的安装包：" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "**Windows:**" >> /tmp/release-body.md
          echo "- .msi - 推荐，安装程序" >> /tmp/release-body.md
          echo "- .exe - 便携版" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "**macOS:**" >> /tmp/release-body.md
          echo "- .dmg - 通用版本" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "**Linux:**" >> /tmp/release-body.md
          echo "- .AppImage - 便携版，无需安装" >> /tmp/release-body.md
          echo "- .deb - Debian/Ubuntu 安装包" >> /tmp/release-body.md
          echo "- .rpm - Fedora/RHEL/CentOS 安装包" >> /tmp/release-body.md
          echo "- .flatpak - Flatpak 通用包" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "## 更新内容" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "$CHANGELOG" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "---" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "**完整变更日志**: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md" >> /tmp/release-body.md
      
      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
        with:
          script: |
            const fs = require('fs');
            const version = process.env.PACKAGE_VERSION;
            const releaseBody = fs.readFileSync('/tmp/release-body.md', 'utf8');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `PostMock v${version}`,
              body: releaseBody,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
