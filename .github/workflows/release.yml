name: Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      
      - name: Get version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="v${{ env.PACKAGE_VERSION }}"
          
          # 从 CHANGELOG.md 提取当前版本的更新内容
          if [ -f "CHANGELOG.md" ]; then
            # 提取版本段落（从 ## [version] 到下一个 ## 或文件末尾）
            CHANGELOG=$(sed -n "/## \[${{ env.PACKAGE_VERSION }}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
            
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="查看完整变更日志了解详情。"
            fi
          else
            CHANGELOG="查看完整变更日志了解详情。"
          fi
          
          # 保存到文件以避免多行问题
          echo "$CHANGELOG" > /tmp/changelog.txt
      
      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('/tmp/changelog.txt', 'utf8');
            
            const releaseBody = `## 📦 下载安装

请根据你的操作系统下载对应的安装包：

| 平台 | 文件类型 | 说明 |
|------|---------|------|
| 🪟 Windows | \`.msi\` | 推荐，安装程序 |
| 🪟 Windows | \`.exe\` | 便携版 |
| 🍎 macOS | \`.dmg\` | 通用版本（Intel + Apple Silicon） |
| 🐧 Linux | \`.AppImage\` | 便携版，无需安装 |
| 🐧 Linux | \`.deb\` | Debian/Ubuntu 安装包 |

## ✨ 更新内容

${changelog}

---

**完整变更日志**: https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md`;

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: \`v\${process.env.PACKAGE_VERSION}\`,
              name: \`PostMock v\${process.env.PACKAGE_VERSION}\`,
              body: releaseBody,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
