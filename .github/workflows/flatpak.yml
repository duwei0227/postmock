name: Build Flatpak

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Download AppImage from release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APPIMAGE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/postmock_${VERSION}_amd64.AppImage"
          
          echo "Downloading AppImage from: $APPIMAGE_URL"
          
          # Wait for release to be available (max 5 minutes)
          for i in {1..30}; do
            if curl -f -L -o /tmp/postmock.AppImage "$APPIMAGE_URL"; then
              echo "AppImage downloaded successfully"
              break
            fi
            echo "Waiting for release to be available... (attempt $i/30)"
            sleep 10
          done
          
          # Calculate SHA256
          SHA256=$(sha256sum /tmp/postmock.AppImage | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          
          # Update manifest with actual SHA256 and version
          sed -i "s|REPLACE_WITH_ACTUAL_SHA256|$SHA256|g" cn.probiecoder.postmock.yml
          sed -i "s|v0.1.0|v${VERSION}|g" cn.probiecoder.postmock.yml
          sed -i "s|postmock_0.1.0_amd64.AppImage|postmock_${VERSION}_amd64.AppImage|g" cn.probiecoder.postmock.yml
      
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: postmock.flatpak
          manifest-path: cn.probiecoder.postmock.yml
          cache-key: flatpak-builder-${{ github.sha }}
      
      - name: Upload Flatpak to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: postmock.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: postmock.flatpak
